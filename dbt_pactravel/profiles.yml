dbt_pactravel:
  outputs:
    # Source database (for reference/debugging)
    sources:
      type: postgres
      host: "{{ env_var('SRC_POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('SRC_POSTGRES_PORT', '5433') | as_number }}"
      user: "{{ env_var('SRC_POSTGRES_USER', 'postgres') }}"
      pass: "{{ env_var('SRC_POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('SRC_POSTGRES_DB', 'pactravel') }}"
      schema: public
      threads: 2

    # Data warehouse (main target)
    dev:
      type: postgres
      host: "{{ env_var('DWH_POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('DWH_POSTGRES_PORT', '5434') | as_number }}"
      user: "{{ env_var('DWH_POSTGRES_USER', 'postgres') }}"
      pass: "{{ env_var('DWH_POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('DWH_POSTGRES_DB', 'pactravel-dwh') }}"
      schema: public
      threads: 4

  target: dev
